# profiles.yml for healthcare_platform dbt project
# For local development, uses file-based database
# For CI/CD, set DBT_TARGET=ci to use in-memory database

healthcare_platform:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    dev:
      type: duckdb
      path: '../data/healthcare.duckdb'
      threads: 4
    ci:
      type: duckdb
      path: ':memory:'
      threads: 4
