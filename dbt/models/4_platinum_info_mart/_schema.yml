version: 2

models:
  - name: patient_summary
    description: "Patient summary view — aggregates demographics with encounter counts, cost totals, and condition counts per patient."
    columns:
      - name: patient_id
        description: "Unique patient identifier"
        tests:
          - unique
          - not_null
      - name: full_name
        description: "Patient full name"
        tests:
          - not_null
      - name: total_encounters
        description: "Total number of healthcare encounters"
      - name: total_claim_cost
        description: "Lifetime total claim costs"
      - name: total_out_of_pocket_cost
        description: "Lifetime out-of-pocket costs"
      - name: total_conditions
        description: "Total condition diagnosis records"
      - name: distinct_conditions
        description: "Count of distinct condition codes"

  - name: encounter_metrics
    description: "Encounter metrics view — aggregates encounter statistics by encounter class (ambulatory, emergency, inpatient, etc.)."
    columns:
      - name: encounter_class
        description: "Type of encounter (ambulatory, emergency, inpatient, etc.)"
        tests:
          - unique
          - not_null
      - name: encounter_count
        description: "Total encounters of this type"
      - name: unique_patients
        description: "Distinct patients with this encounter type"
      - name: avg_claim_cost
        description: "Average claim cost per encounter"

  - name: condition_summary
    description: "Condition summary view — top conditions by frequency with patient counts and average duration."
    columns:
      - name: condition_code
        description: "SNOMED-CT condition code"
        tests:
          - unique
          - not_null
      - name: condition_description
        description: "Human-readable condition name"
        tests:
          - not_null
      - name: condition_count
        description: "Total occurrences of this condition"
      - name: unique_patients
        description: "Distinct patients diagnosed with this condition"
      - name: avg_duration_days
        description: "Average duration in days (null for chronic/ongoing conditions)"

  - name: medication_summary
    description: "Medication summary view — top medications by cost and frequency with payer coverage ratios."
    columns:
      - name: medication_code
        description: "RxNorm medication code"
        tests:
          - unique
          - not_null
      - name: medication_description
        description: "Human-readable medication name"
        tests:
          - not_null
      - name: prescription_count
        description: "Total prescriptions"
      - name: unique_patients
        description: "Distinct patients prescribed this medication"
      - name: total_medication_cost
        description: "Total cost across all prescriptions"
      - name: payer_coverage_pct
        description: "Percentage of cost covered by payer"
