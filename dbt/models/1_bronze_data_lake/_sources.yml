version: 2

# Synthea source definitions for DuckDB external CSV files
# Uses dbt-duckdb's external source capability to read CSV files directly

sources:
  - name: synthea
    description: Synthea synthetic healthcare data (CSV files)
    meta:
      # Pattern for CSV file locations - {name} is replaced with table name
      external_location: "read_csv('../data/synthea/{name}.csv', auto_detect=true, header=true)"

    tables:
      - name: patients
        description: Patient demographics and basic information
        columns:
          - name: Id
            description: Unique patient identifier (UUID)
            data_tests:
              - unique
              - not_null
          - name: BIRTHDATE
            description: Patient date of birth
          - name: DEATHDATE
            description: Patient date of death (null if alive)
          - name: SSN
            description: Social Security Number
          - name: DRIVERS
            description: Driver's license number
          - name: PASSPORT
            description: Passport number
          - name: PREFIX
            description: Name prefix (Mr., Mrs., etc.)
          - name: FIRST
            description: Patient first name
          - name: LAST
            description: Patient last name
          - name: SUFFIX
            description: Name suffix (Jr., Sr., etc.)
          - name: MAIDEN
            description: Maiden name
          - name: MARITAL
            description: Marital status (M/S)
          - name: RACE
            description: Patient race
          - name: ETHNICITY
            description: Patient ethnicity
          - name: GENDER
            description: Patient gender (M/F)
          - name: BIRTHPLACE
            description: Patient birthplace
          - name: ADDRESS
            description: Street address
          - name: CITY
            description: City
          - name: STATE
            description: State
          - name: COUNTY
            description: County
          - name: ZIP
            description: ZIP code
          - name: LAT
            description: Latitude
          - name: LON
            description: Longitude
          - name: HEALTHCARE_EXPENSES
            description: Total lifetime healthcare expenses
          - name: HEALTHCARE_COVERAGE
            description: Total lifetime healthcare coverage

      - name: encounters
        description: Healthcare encounters (visits, admissions)
        columns:
          - name: Id
            description: Unique encounter identifier (UUID)
            data_tests:
              - unique
              - not_null
          - name: START
            description: Encounter start datetime
          - name: STOP
            description: Encounter end datetime
          - name: PATIENT
            description: Reference to patient ID
            data_tests:
              - not_null
          - name: ORGANIZATION
            description: Reference to organization ID
          - name: PROVIDER
            description: Reference to provider ID
          - name: PAYER
            description: Reference to payer ID
          - name: ENCOUNTERCLASS
            description: Type of encounter (ambulatory, emergency, inpatient, etc.)
          - name: CODE
            description: Encounter reason code
          - name: DESCRIPTION
            description: Encounter description
          - name: BASE_ENCOUNTER_COST
            description: Base cost of the encounter
          - name: TOTAL_CLAIM_COST
            description: Total claim cost
          - name: PAYER_COVERAGE
            description: Amount covered by payer
          - name: REASONCODE
            description: Reason code for the encounter
          - name: REASONDESCRIPTION
            description: Reason description

      - name: conditions
        description: Patient conditions/diagnoses
        columns:
          - name: START
            description: Condition onset date
          - name: STOP
            description: Condition resolution date (null if ongoing)
          - name: PATIENT
            description: Reference to patient ID
            data_tests:
              - not_null
          - name: ENCOUNTER
            description: Reference to encounter ID
          - name: CODE
            description: SNOMED-CT condition code
          - name: DESCRIPTION
            description: Condition description

      - name: procedures
        description: Medical procedures performed
        columns:
          - name: DATE
            description: Procedure date
          - name: PATIENT
            description: Reference to patient ID
          - name: ENCOUNTER
            description: Reference to encounter ID
          - name: CODE
            description: SNOMED-CT procedure code
          - name: DESCRIPTION
            description: Procedure description
          - name: BASE_COST
            description: Base cost of procedure
          - name: REASONCODE
            description: Reason code
          - name: REASONDESCRIPTION
            description: Reason description

      - name: medications
        description: Medication orders and dispenses
        columns:
          - name: START
            description: Medication start date
          - name: STOP
            description: Medication stop date
          - name: PATIENT
            description: Reference to patient ID
          - name: PAYER
            description: Reference to payer ID
          - name: ENCOUNTER
            description: Reference to encounter ID
          - name: CODE
            description: RxNorm medication code
          - name: DESCRIPTION
            description: Medication description
          - name: BASE_COST
            description: Base cost of medication
          - name: PAYER_COVERAGE
            description: Amount covered by payer
          - name: DISPENSES
            description: Number of dispenses
          - name: TOTALCOST
            description: Total cost
          - name: REASONCODE
            description: Reason code
          - name: REASONDESCRIPTION
            description: Reason description

      - name: observations
        description: Clinical observations (labs, vitals, assessments)
        columns:
          - name: DATE
            description: Observation date
          - name: PATIENT
            description: Reference to patient ID
          - name: ENCOUNTER
            description: Reference to encounter ID
          - name: CODE
            description: LOINC observation code
          - name: DESCRIPTION
            description: Observation description
          - name: VALUE
            description: Observation value
          - name: UNITS
            description: Observation units
          - name: TYPE
            description: Observation type

      - name: organizations
        description: Healthcare organizations/facilities
        columns:
          - name: Id
            description: Unique organization identifier
            data_tests:
              - unique
              - not_null
          - name: NAME
            description: Organization name
          - name: ADDRESS
            description: Organization address
          - name: CITY
            description: Organization city
          - name: STATE
            description: Organization state
          - name: ZIP
            description: ZIP code
          - name: LAT
            description: Latitude
          - name: LON
            description: Longitude
          - name: PHONE
            description: Phone number
          - name: REVENUE
            description: Organization revenue
          - name: UTILIZATION
            description: Utilization count

      - name: providers
        description: Healthcare providers (physicians, practitioners)
        columns:
          - name: Id
            description: Unique provider identifier
            data_tests:
              - unique
              - not_null
          - name: ORGANIZATION
            description: Reference to organization ID
          - name: NAME
            description: Provider name
          - name: GENDER
            description: Provider gender
          - name: SPECIALITY
            description: Provider specialty
          - name: ADDRESS
            description: Provider address
          - name: CITY
            description: Provider city
          - name: STATE
            description: Provider state
          - name: ZIP
            description: ZIP code
          - name: LAT
            description: Latitude
          - name: LON
            description: Longitude
          - name: UTILIZATION
            description: Utilization count

      - name: payers
        description: Insurance payers/companies
        columns:
          - name: Id
            description: Unique payer identifier
            data_tests:
              - unique
              - not_null
          - name: NAME
            description: Payer name
          - name: ADDRESS
            description: Payer address
          - name: CITY
            description: Payer city
          - name: STATE_HEADQUARTERED
            description: State where payer is headquartered
          - name: ZIP
            description: ZIP code
          - name: PHONE
            description: Phone number
          - name: AMOUNT_COVERED
            description: Total amount covered
          - name: AMOUNT_UNCOVERED
            description: Total amount uncovered
          - name: REVENUE
            description: Payer revenue
          - name: COVERED_ENCOUNTERS
            description: Number of covered encounters
          - name: UNCOVERED_ENCOUNTERS
            description: Number of uncovered encounters
          - name: COVERED_MEDICATIONS
            description: Number of covered medications
          - name: UNCOVERED_MEDICATIONS
            description: Number of uncovered medications
          - name: COVERED_PROCEDURES
            description: Number of covered procedures
          - name: UNCOVERED_PROCEDURES
            description: Number of uncovered procedures
          - name: COVERED_IMMUNIZATIONS
            description: Number of covered immunizations
          - name: UNCOVERED_IMMUNIZATIONS
            description: Number of uncovered immunizations
          - name: UNIQUE_CUSTOMERS
            description: Number of unique customers
          - name: QOLS_AVG
            description: Average quality of life score
          - name: MEMBER_MONTHS
            description: Total member months

      - name: payer_transitions
        description: Patient insurance coverage changes over time
        columns:
          - name: PATIENT
            description: Reference to patient ID
          - name: START_YEAR
            description: Coverage start year
          - name: END_YEAR
            description: Coverage end year
          - name: PAYER
            description: Reference to payer ID
          - name: OWNERSHIP
            description: Coverage ownership type

      - name: allergies
        description: Patient allergies
        columns:
          - name: START
            description: Allergy onset date
          - name: STOP
            description: Allergy resolution date
          - name: PATIENT
            description: Reference to patient ID
          - name: ENCOUNTER
            description: Reference to encounter ID
          - name: CODE
            description: Allergy code
          - name: DESCRIPTION
            description: Allergy description

      - name: immunizations
        description: Immunization records
        columns:
          - name: DATE
            description: Immunization date
          - name: PATIENT
            description: Reference to patient ID
          - name: ENCOUNTER
            description: Reference to encounter ID
          - name: CODE
            description: CVX immunization code
          - name: DESCRIPTION
            description: Immunization description
          - name: BASE_COST
            description: Immunization base cost

      - name: careplans
        description: Care plan records
        columns:
          - name: Id
            description: Unique careplan identifier (UUID)
          - name: START
            description: Care plan start date
          - name: STOP
            description: Care plan end date
          - name: PATIENT
            description: Reference to patient ID
          - name: ENCOUNTER
            description: Reference to encounter ID
          - name: CODE
            description: Care plan code
          - name: DESCRIPTION
            description: Care plan description
          - name: REASONCODE
            description: Reason code
          - name: REASONDESCRIPTION
            description: Reason description

      - name: imaging_studies
        description: Medical imaging study metadata
        columns:
          - name: Id
            description: Unique imaging study identifier (UUID)
          - name: DATE
            description: Study date
          - name: PATIENT
            description: Reference to patient ID
          - name: ENCOUNTER
            description: Reference to encounter ID
          - name: BODYSITE_CODE
            description: Body site code
          - name: BODYSITE_DESCRIPTION
            description: Body site description
          - name: MODALITY_CODE
            description: Imaging modality code
          - name: MODALITY_DESCRIPTION
            description: Imaging modality description
          - name: SOP_CODE
            description: SOP instance code
          - name: SOP_DESCRIPTION
            description: SOP instance description

      - name: devices
        description: Medical devices
        columns:
          - name: START
            description: Device start date
          - name: STOP
            description: Device stop date
          - name: PATIENT
            description: Reference to patient ID
          - name: ENCOUNTER
            description: Reference to encounter ID
          - name: CODE
            description: Device code
          - name: DESCRIPTION
            description: Device description
          - name: UDI
            description: Unique Device Identifier

      - name: supplies
        description: Medical supplies
        columns:
          - name: DATE
            description: Supply date
          - name: PATIENT
            description: Reference to patient ID
          - name: ENCOUNTER
            description: Reference to encounter ID
          - name: CODE
            description: Supply code
          - name: DESCRIPTION
            description: Supply description
          - name: QUANTITY
            description: Supply quantity
