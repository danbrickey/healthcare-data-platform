
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'healthcare_platform'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'healthcare_platform'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# Medallion Architecture model configurations
models:
  healthcare_platform:
    # Bronze layer: raw source data, minimal transformation
    1_bronze_data_lake:
      +materialized: view
      +schema: bronze_data_lake
    
    # Silver layer: Data Vault 2.0 core structures
    2_silver_raw_vault:
      +materialized: incremental
      +schema: silver_raw_vault
      staging:
        +materialized: view
        +tags: ["staging", "silver"]
      hubs:
        +tags: ["hub", "silver"]
      links:
        +tags: ["link", "silver"]
      sats:
        +tags: ["satellite", "silver"]
    
    # Gold layer: business vault and dimensional models
    3_gold_business_vault:
      +schema: gold_business_vault
      business_vault:
        +materialized: view
        +schema: gold_business_vault
      dimensional:
        +materialized: table
        +schema: gold_dimensional
    
    # Platinum layer: virtualized views by use case
    4_platinum_info_mart:
      +materialized: view
      +schema: platinum_info_mart

# AutomateDV configuration
vars:
  automate_dv_hash: 'MD5'
  automate_dv_enable_ghost_record: false

# Dispatch configuration for DuckDB adapter support
# This allows our project's DuckDB-specific macros to override AutomateDV defaults
dispatch:
  - macro_namespace: automate_dv
    search_order: ['healthcare_platform', 'automate_dv']
